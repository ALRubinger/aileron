version: "3"

tasks:
  build:
    desc: Build server binary and UI
    deps: [build:server, build:ui]

  build:server:
    desc: Build the Go server binary → bin/aileron-server
    cmds:
      - go build -o bin/aileron-server ./core/server
    generates:
      - bin/aileron-server

  build:ui:
    desc: Install UI deps and build SvelteKit
    dir: ui
    cmds:
      - pnpm install --frozen-lockfile
      - pnpm build

  test:
    desc: Run Go tests
    cmds:
      - go test ./core/... ./sdk/go/...

  lint:
    desc: Run Go vet and UI typecheck
    cmds:
      - go vet ./core/... ./sdk/go/...
      - cmd: pnpm typecheck
        dir: ui

  up:
    desc: Start full stack (API, UI, Postgres) in the background
    cmds:
      - docker compose -f deploy/docker-compose.yml up --build -d

  down:
    desc: Stop and remove containers
    cmds:
      - docker compose -f deploy/docker-compose.yml down

  logs:
    desc: Tail container logs
    cmds:
      - docker compose -f deploy/docker-compose.yml logs -f

  dev:server:
    desc: Run Go server locally (no Docker)
    cmds:
      - go run ./core/server

  dev:ui:
    desc: Run SvelteKit dev server
    dir: ui
    cmds:
      - pnpm dev

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin/ ui/.svelte-kit ui/build ui/node_modules
